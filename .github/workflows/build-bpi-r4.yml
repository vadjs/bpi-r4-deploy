name: Build BPI-R4

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'nvme'
        type: choice
        options:
          - nvme
          - sdcard
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Set build variables
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "nvme" ]; then
            echo "BUILDER=./bpi-r4-openwrt-builder-nvme.sh" >> $GITHUB_ENV
            echo "RELEASE_TAG=release-nvme" >> $GITHUB_ENV
            echo "RELEASE_NAME=BPI-R4 NVMe build (latest)" >> $GITHUB_ENV
          else
            echo "BUILDER=./bpi-r4-openwrt-builder-sd-emmc.sh" >> $GITHUB_ENV
            echo "RELEASE_TAG=release-sdcard" >> $GITHUB_ENV
            echo "RELEASE_NAME=BPI-R4 SD/eMMC build (latest)" >> $GITHUB_ENV
          fi

      - name: Delete existing release and tag for this build type
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;

            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });

            for (const rel of releases.data) {
              if (rel.tag_name === tag) {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: rel.id
                }).catch(e => console.log(`Failed to delete release ${rel.id}: ${e.message}`));
              }
            }

            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `tags/${tag}`
            }).catch(e => console.log(`Failed to delete tag ${tag}: ${e.message}`));
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Run builder script
        run: |
          chmod +x ${{ env.BUILDER }}
          ${{ env.BUILDER }}

      - name: Prepare NVMe artifacts
        if: github.event.inputs.build_type == 'nvme'
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-squashfs-sysupgrade.itb bpi-r4.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-poe-squashfs-sysupgrade.itb bpi-r4-poe.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-8g-squashfs-sysupgrade.itb bpi-r4-8g.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-squashfs-sysupgrade.itb bpi-r4-poe-8g.itb

      - name: Prepare SD/eMMC artifacts
        if: github.event.inputs.build_type == 'sdcard'
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-squashfs-sysupgrade.itb bpi-r4.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-poe-squashfs-sysupgrade.itb bpi-r4-poe.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-8g-squashfs-sysupgrade.itb bpi-r4-8g.itb
          cp openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-squashfs-sysupgrade.itb bpi-r4-poe-8g.itb

      - name: Generate sha256sums
        run: |
          cd openwrt/bin/targets/mediatek/filogic
          if [ "${{ github.event.inputs.build_type }}" = "nvme" ]; then
            sha256sum \
              openwrt-mediatek-filogic-bananapi_bpi-r4-nvme-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-nvme-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-8g-nvme-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-nvme-img.bin \
              bpi-r4.itb bpi-r4-poe.itb bpi-r4-8g.itb bpi-r4-poe-8g.itb \
              > sha256sums
          else
            sha256sum \
              openwrt-mediatek-filogic-bananapi_bpi-r4-sdcard.img.gz \
              openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-sdcard.img.gz \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-emmc-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-8g-sdcard.img.gz \
              openwrt-mediatek-filogic-bananapi_bpi-r4-8g-emmc-img.bin \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-sdcard.img.gz \
              openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-emmc-img.bin \
              bpi-r4.itb bpi-r4-poe.itb bpi-r4-8g.itb bpi-r4-poe-8g.itb \
              > sha256sums
          fi

      - name: Create NVMe release
        if: github.event.inputs.build_type == 'nvme'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            Build type: NVMe (large partitions — p1: 255M, p2: 448M, p3: remaining disk)
            Repository commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: |
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-nvme-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-nvme-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-8g-nvme-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-nvme-img.bin
            openwrt/bin/targets/mediatek/filogic/bpi-r4.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-poe.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-8g.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-poe-8g.itb
            openwrt/bin/targets/mediatek/filogic/sha256sums
            openwrt/bin/targets/mediatek/filogic/config.buildinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SD/eMMC release
        if: github.event.inputs.build_type == 'sdcard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            Build type: SD/eMMC (standard partitions)
            Repository commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: |
            rescue/bpi-r4-rescue-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-emmc-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-8g-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-8g-emmc-img.bin
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-sdcard.img.gz
            openwrt/bin/targets/mediatek/filogic/openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8g-emmc-img.bin
            openwrt/bin/targets/mediatek/filogic/bpi-r4.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-poe.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-8g.itb
            openwrt/bin/targets/mediatek/filogic/bpi-r4-poe-8g.itb
            openwrt/bin/targets/mediatek/filogic/sha256sums
            openwrt/bin/targets/mediatek/filogic/config.buildinfo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
